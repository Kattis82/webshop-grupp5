<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin</title>
</head>
<body>
<header>
    <span>Meny</span>
    nav>
    <h4>Kategorier: </h4>
    <a th:href="@{/products}">Alla</a>
    <a th:href="@{/products(category='Sushi')}">Sushi</a>
    <a th:href="@{/products(category='Pizza')}">Pizza</a>
    <a th:href="@{/products(category='Pasta')}">Pasta</a>
    </nav>
    <!--    Möjlighet att söka efter produkter-->
    <form th:action="@{/products/search}" method="get">
        <input type="text" name="query" placeholder="Sök efter produkt">
        <button type="submit">Sök</button>
    </form>
</header>
<main>
    <h1>Admin produkter</h1>

    <a th:href="@{/admin/products/create}">
        <button>Skapa ny produkt</button>
    </a>

    <div class="product-container">
        <div class="product-card" th:each="product : ${products}">
            <h2 th:text="${product.name}">Produktnamn</h2>
            <img th:src="${product.pictureUrl}" alt="Produktbild" class="product-image"
                 style="width: 200px; height: 200px; object-fit: cover;"/>
            <p><strong>Pris:</strong> <span th:text="${product.price}"></span> kr</p>
            <p><strong>Kategori:</strong> <span th:text="${product.category}"></span></p>
            <a th:href="@{'/products/name/' + ${product.name}}">Visa produktinfo</a>
            <a th:href="@{'/products/add/' + ${product.id}}" class="add-to-cart-btn">Lägg till i kundvagn</a>

                <form th:action="@{/admin/products/delete}" method="post">
                    <input type="hidden" name="id" th:value="${product.id}">
                    <button type="submit">Radera produkt</button>
                </form>
        </div>
    </div>
</main>
</body>
</html>
