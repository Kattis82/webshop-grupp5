<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orderbekräftelse</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            padding: 20px;
        }

        footer {
            background: #eee;
            padding: 10px;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<main>

    <h1>Tack för din beställning!</h1>

    <p>
        Ordernummer:
        <strong th:text="${order.id}"></strong>
    </p>

    <p>
        Datum:
        <span th:text="${order.orderDate}"></span>
    </p>


    <!-- Om ordern saknar produkter -->
    <div th:if="${#lists.isEmpty(order.orderItems)}">
        <p>Ordern innehåller inga produkter.</p>
    </div>


    <!-- Om ordern innehåller produkter -->
    <div th:unless="${#lists.isEmpty(order.orderItems)}">

        <table>
            <thead>
            <tr>
                <th>Produkt</th>
                <th>Pris</th>
                <th>Antal</th>
                <th>Summa</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${order.orderItems}">
                <td th:text="${item.productName}"></td>

                <td th:text="${item.price} + ' kr'"></td>

                <td th:text="${item.quantity}"></td>

                <td th:text="${item.price * item.quantity} + ' kr'"></td>
            </tr>

            </tbody>
        </table>


        <p>
            <strong>Totalt:</strong>
            <span th:text="${order.totalPrice} + ' kr'"></span>
        </p>

    </div>


    <p>
        En orderbekräftelse har skickats till
        <span th:text="${order.username}"></span>.
    </p>


    <br>

    <a href="/products">Fortsätt handla</a>

</main>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
